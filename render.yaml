services:
  - type: web
    name: browser-use-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: BROWSER_USE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_BASE_URL
        sync: false
      - key: GOOGLE_API_KEY
        sync: false

